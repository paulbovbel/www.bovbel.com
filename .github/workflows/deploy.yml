name: Deploy sites

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

concurrency:
  group: deploy-sites
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ${{ matrix.domain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - domain: paul.bovbel.com
            stack: paul-bovbel-com
            role: paul-bovbel-com-deploy
            run_tests: true
          - domain: rebecca.bovbel.com
            stack: rebecca-bovbel-com
            role: rebecca-bovbel-com-deploy
            run_tests: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync

    - name: Run pre-deploy tests
      if: matrix.run_tests
      run: uv run pytest test.py -v -m pre_deploy --junit-xml=results-pre-deploy-${{ matrix.stack }}.xml

    - name: Publish pre-deploy test results
      uses: mikepenz/action-junit-report@v6
      if: always() && matrix.run_tests
      with:
        report_paths: results-pre-deploy-${{ matrix.stack }}.xml
        fail_on_failure: true
        check_name: Pre-deploy Tests (${{ matrix.domain }})

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: arn:aws:iam::713134244406:role/${{ matrix.role }}
        aws-region: us-east-2

    - name: Upload to S3
      run: uv run deploy-site --stack ${{ matrix.stack }}

    - name: Run post-deploy tests
      if: matrix.run_tests
      run: uv run pytest test.py -v -m post_deploy --junit-xml=results-post-deploy-${{ matrix.stack }}.xml

    - name: Publish post-deploy test results
      uses: mikepenz/action-junit-report@v6
      if: always() && matrix.run_tests
      with:
        report_paths: results-post-deploy-${{ matrix.stack }}.xml
        fail_on_failure: true
        check_name: Post-deploy Tests (${{ matrix.domain }})
